<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FireThings — fire alarm management software for engineers. Coming soon.">
    <title>FireThings — Coming Soon</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ft-primary: #1A1A2E;
            --ft-accent: #FFB020;
            --ft-fg1: #1F2937;
            --ft-fg2: #6B7280;
            --ft-bg: #FAFAF7;
            --ft-border: #E8E5DE;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--ft-bg);
            color: var(--ft-fg1);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 32px;
            position: relative;
            overflow: hidden;
        }

        .glow-accent {
            position: absolute;
            top: -160px;
            right: -160px;
            width: 480px;
            height: 480px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 176, 32, 0.1), transparent 70%);
            pointer-events: none;
        }

        .glow-primary {
            position: absolute;
            bottom: -200px;
            left: -200px;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(26, 26, 46, 0.06), transparent 70%);
            pointer-events: none;
        }

        .content {
            position: relative;
            text-align: center;
            max-width: 520px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 40px;
        }

        .logo-emoji { font-size: 32px; }

        .logo-text {
            font-family: 'Outfit', sans-serif;
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: var(--ft-primary);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            background: rgba(255, 176, 32, 0.1);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--ft-accent);
            letter-spacing: 0.3px;
            margin-bottom: 24px;
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background: var(--ft-accent);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 48px;
            line-height: 1.08;
            letter-spacing: -1px;
            font-weight: 800;
            color: var(--ft-primary);
            margin-bottom: 16px;
        }

        h1 span { color: var(--ft-accent); }

        .subtitle {
            font-size: 17px;
            line-height: 1.6;
            color: var(--ft-fg2);
            margin-bottom: 36px;
        }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .btn-portal {
            display: inline-block;
            padding: 14px 28px;
            border: none;
            border-radius: 10px;
            background: var(--ft-accent);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.15s, transform 0.15s;
            box-shadow: 0 8px 24px rgba(255, 176, 32, 0.3);
        }

        .btn-portal:hover {
            background: #E69D1C;
            transform: translateY(-1px);
        }

        .link-notify {
            font-size: 13px;
            color: var(--ft-fg2);
        }

        .link-notify a {
            color: var(--ft-primary);
            font-weight: 600;
            text-decoration: none;
        }

        .link-notify a:hover { text-decoration: underline; }

        .footer {
            position: absolute;
            bottom: 32px;
            font-size: 12px;
            color: var(--ft-fg2);
        }

        @media (max-width: 600px) {
            h1 { font-size: 34px; }
            .subtitle { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div class="glow-accent"></div>
    <div class="glow-primary"></div>

    <div class="content">
        <div class="logo">
            <span class="logo-emoji">🔥</span>
            <span class="logo-text">FireThings</span>
        </div>

        <div class="badge">
            <span class="badge-dot"></span>
            Coming Soon
        </div>

        <h1>Fire safety jobs that <span>run themselves</span></h1>

        <p class="subtitle">
            We're building the all-in-one platform for fire alarm engineers — dispatch, jobsheets,
            compliance, and invoicing. Launching soon.
        </p>

        <div class="actions">
            <a href="https://app.firethings.co.uk" class="btn-portal">Open Dispatch Portal</a>
            <p class="link-notify">Already have an account? <a href="https://app.firethings.co.uk">Sign in here</a></p>
        </div>
    </div>

    <div class="footer">&copy; 2026 FireThings Ltd.</div>
</body>
</html>
