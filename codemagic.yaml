workflows:
  ios-release:
    name: iOS Release (TestFlight)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
      groups:
        - app_store_credentials  # Add in Codemagic UI: APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_ISSUER_ID, APP_STORE_CONNECT_PRIVATE_KEY
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.firethings.app  # Update with your actual bundle ID
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Run analyzer
        script: flutter analyze --no-fatal-infos
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build iOS
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: Encrypted(...)
        key_id: K2M9YD6L8W
        issuer_id: 74d5a101-8ffa-4f01-b6e9-dac1b7984629
        submit_to_testflight: true
        beta_groups:
          - Internal Testers

  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - name: Install dependencies
        script: flutter pub get
      - name: Run analyzer
        script: flutter analyze --no-fatal-infos
      - name: Build APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
